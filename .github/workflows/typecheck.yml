name: Type Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ty:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Run ty
        run: uv run ty check
